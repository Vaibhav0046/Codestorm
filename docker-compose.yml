version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: codestorm-db
    restart: always
    environment:
      MYSQL_DATABASE: codestorm
      MYSQL_ROOT_PASSWORD: root_password
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  backend1:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: codestorm-backend-1
    restart: always
    depends_on:
      - db
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://db:3306/codestorm?useSSL=false&serverTimezone=Asia/Kolkata&allowPublicKeyRetrieval=true
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=root_password
      - JWT_SECRET=super_secret_key_minimum_32_characters_long_for_security
      - JWT_EXPIRATION=86400000
      - CORS_ALLOWED_ORIGINS=http://localhost
    ports:
      - "8001:8000"

  backend2:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: codestorm-backend-2
    restart: always
    depends_on:
      - db
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://db:3306/codestorm?useSSL=false&serverTimezone=Asia/Kolkata&allowPublicKeyRetrieval=true
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=root_password
      - JWT_SECRET=super_secret_key_minimum_32_characters_long_for_security
      - JWT_EXPIRATION=86400000
      - CORS_ALLOWED_ORIGINS=http://localhost
    ports:
      - "8002:8000"

  nginx:
    image: nginx:alpine
    container_name: codestorm-loadbalancer
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend1
      - backend2

volumes:
  db_data:
