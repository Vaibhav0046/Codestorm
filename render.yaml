services:
  - type: web
    name: codestorm-backend
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    envVars:
      - key: SPRING_DATASOURCE_URL
        sync: false   # Set this manually in Render dashboard: jdbc:mysql://<host>:<port>/<dbname>?useSSL=true&requireSSL=true&serverTimezone=UTC&allowPublicKeyRetrieval=true
      - key: SPRING_DATASOURCE_USERNAME
        sync: false   # Set this in Render dashboard
      - key: SPRING_DATASOURCE_PASSWORD
        sync: false   # Set this in Render dashboard
      - key: JWT_SECRET
        sync: false   # Set a strong random secret in Render dashboard (min 32 chars)
      - key: JWT_EXPIRATION
        value: "86400000"
      - key: SPRING_MAIL_HOST
        value: "smtp.gmail.com"
      - key: SPRING_MAIL_PORT
        value: "587"
      - key: SPRING_MAIL_USERNAME
        sync: false   # Set your Gmail address in Render dashboard
      - key: SPRING_MAIL_PASSWORD
        sync: false   # Set your Gmail App Password in Render dashboard
      - key: SPRING_MAIL_SMTP_AUTH
        value: "true"
      - key: SPRING_MAIL_STARTTLS_ENABLE
        value: "true"
      - key: SPRING_MAIL_STARTTLS_REQUIRED
        value: "true"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://codestorm-backend-4i2q.onrender.com"
      - key: UPLOAD_DIR
        value: "/app/uploads"
    healthCheckPath: /api/auth/health
    numInstances: 1
    plan: free
