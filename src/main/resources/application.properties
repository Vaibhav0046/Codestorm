spring.application.name=backend

server.port=8000

# DATABASE
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/codestorm}

# MAIL CONFIGURATION (Local/Mock SMTP)
#spring.mail.host=localhost
#spring.mail.port=25
#spring.mail.username=test@example.com
#spring.mail.password=password
#spring.mail.properties.mail.smtp.auth=false
#spring.mail.properties.mail.smtp.starttls.enable=false

# OPTIONAL: To receive real emails to your inbox, configure your actual SMTP credentials (e.g. Gmail):
spring.mail.host=${SPRING_MAIL_HOST:smtp.gmail.com}
spring.mail.port=${SPRING_MAIL_PORT:587}
spring.mail.username=${SPRING_MAIL_USERNAME:your_email@gmail.com}
spring.mail.password=${SPRING_MAIL_PASSWORD:your_app_specific_password}
spring.mail.properties.mail.smtp.auth=${SPRING_MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${SPRING_MAIL_STARTTLS_ENABLE:true}
spring.mail.properties.mail.smtp.starttls.required=${SPRING_MAIL_STARTTLS_REQUIRED:true}

# JWT
jwt.secret=yourSecretKey
jwt.expiration=86400000

# MULTIPART BOUNDS (Large highlights images)
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB