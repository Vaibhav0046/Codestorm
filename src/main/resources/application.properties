spring.application.name=backend

server.port=${PORT:8000}

# DATABASE - MySQL (Render environment variables override local defaults)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/codestorm?useSSL=false&serverTimezone=Asia/Kolkata&allowPublicKeyRetrieval=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:7569059847r@}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Connection Pool (important for cloud deployments)
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# MAIL CONFIGURATION
# IMPORTANT: Set SPRING_MAIL_USERNAME and SPRING_MAIL_PASSWORD as environment variables on Render
# Use a Gmail App Password (not your regular Gmail password)
spring.mail.host=${SPRING_MAIL_HOST:smtp.gmail.com}
spring.mail.port=${SPRING_MAIL_PORT:587}
spring.mail.username=${SPRING_MAIL_USERNAME:noreply@codestorm.app}
spring.mail.password=${SPRING_MAIL_PASSWORD:changeme}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000
spring.mail.default-encoding=UTF-8

# JWT
jwt.secret=${JWT_SECRET:yourSecretKey}
jwt.expiration=${JWT_EXPIRATION:86400000}

# MULTIPART BOUNDS (Large highlights images)
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# LOCAL FILE UPLOAD (use /tmp for ephemeral container compatibility on Render)
upload.dir=${UPLOAD_DIR:uploads}
spring.web.resources.static-locations=classpath:/static/,file:${UPLOAD_DIR:uploads}/

# CORS - override on Render with your actual deployed URL
# Example: app.cors.allowed-origins=https://your-app.onrender.com,https://your-frontend.onrender.com
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000,http://127.0.0.1:5173,http://127.0.0.1:3000}